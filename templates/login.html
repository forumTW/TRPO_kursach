{% extends 'base.html' %}
{% block title %}Вход — Квалиас{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card anim">
    <div class="tc mb6">
      <div style="width:50px;height:50px;background:linear-gradient(135deg,var(--ac),var(--ac3));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 14px;box-shadow:0 8px 24px rgba(124,106,247,.4)">✦</div>
      <div class="fn" style="font-size:1.5rem">Добро пожаловать</div>
      <div class="tm ts mt2">Войдите в свой аккаунт</div>
    </div>
    <form method="post">
      <div class="fg">
        <label class="lbl">Имя пользователя</label>
        <input type="text" name="username" placeholder="Введите логин" required autofocus>
      </div>
      <div class="fg" style="margin-bottom:22px">
        <label class="lbl">Пароль</label>
        <input type="password" name="password" placeholder="Введите пароль" required>
      </div>
      <button type="submit" class="btn btn-p btn-xl btn-full">Войти <i class="bi bi-arrow-right"></i></button>
    </form>
    <hr>
    <div class="tc ts tm">Нет аккаунта? <a href="{{ url_for('register') }}" style="color:var(--ac);font-weight:600;text-decoration:none">Зарегистрироваться</a></div>
  </div>
</div>
{% endblock %}
